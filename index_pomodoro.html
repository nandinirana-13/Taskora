<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskora | Focus Sprint</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="container">

        <h1>Focus Sprint</h1>
        <p>Power your focus with Taskora</p>

        <div class="timer">
            <span id="minutes">25</span>:<span id="seconds">00</span>
        </div>

        <div class="buttons">
            <button id="start">Start</button>
            <button id="pause">Pause</button>
            <button id="reset">Reset</button>
        </div>

        <section class="email-section">
            <h2>Stay Connected</h2>
            <p>Get smart productivity tips from Taskora</p>

            <form class="email-form" onsubmit="handleSubscribe(event)">
                <input type="email" id="emailInput" placeholder="Enter your email" required />
                <button type="submit">Subscribe</button>
            </form>

            <p id="successMsg" style="display:none; color: lightgreen; margin-top:10px;">
                Successfully subscribed!
            </p>
        </section>

        <p style="margin-top:20px; font-size:12px;">
            © Taskora | Created by Nandini & Aastik
        </p>

    </div>

    <script src="script.js"></script>

    <script>
        function handleSubscribe(e) {
            e.preventDefault();

            const email = document.getElementById("emailInput").value;

            if (email === "") return;

            document.getElementById("successMsg").style.display = "block";
            document.getElementById("emailInput").value = "";
        }
    </script>

</body>
</html>
